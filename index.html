<!DOCTYPE html>

<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPOSTOR</title>

  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f2f2f7;
      margin:0;
      padding:20px;
      display:flex;
      justify-content:center;
    }

    .card{
      width:100%;
      max-width:420px;
      background:white;
      border-radius:28px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    h1{
      text-align:center;
      font-size:42px;
      margin:0 0 8px;
    }

    .subtitle{
      text-align:center;
      color:#6b7280;
      margin-bottom:24px;
    }

    input,button{
      width:100%;
      padding:16px;
      border-radius:16px;
      font-size:16px;
      box-sizing:border-box;
      margin-bottom:14px;
    }

    input{
      border:1px solid #d1d5db;
    }

    button{
      border:none;
      background:#111827;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    .secondary{
      background:#f3f4f6;
      color:#111827;
    }

    .hidden{
      display:none;
    }

    .code{
      font-size:32px;
      font-weight:800;
      text-align:center;
      letter-spacing:2px;
      margin:8px 0 20px;
    }

    .player{
      padding:8px 0;
      font-size:16px;
    }

    .role{
      background:#f9fafb;
      border-radius:22px;
      padding:24px;
      text-align:center;
    }

    .impostor{
      background:#fef2f2;
      color:#dc2626;
    }

    .score{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #eee;
    }

    .winner{
      background:#ecfdf5;
      border-radius:24px;
      padding:24px;
      text-align:center;
      margin-top:12px;
    }
  </style>

</head>
<body>

<div class="card">

  <!-- HOME -->

  <div id="home">
    <h1>🎭 IMPOSTOR</h1>
    <p class="subtitle">Monikierros seurapeli</p>

```
<input id="name" placeholder="Nimesi" />
<input id="joinCode" placeholder="Pelikoodi" />

<button id="createBtn">Luo peli</button>
<button id="joinBtn" class="secondary">Liity peliin</button>
```

  </div>

  <!-- LOBBY -->

  <div id="lobby" class="hidden">
    <h2>Pelikoodi</h2>
    <div id="gameCode" class="code"></div>

```
<h3>Pelaajat</h3>
<div id="playerList"></div>

<button id="startBtn">Aloita kierros</button>
```

  </div>

  <!-- ROLE -->

  <div id="roleScreen" class="hidden">
    <div id="roundInfo" style="margin-bottom:12px;font-weight:600"></div>
    <div id="roleCard" class="role"></div>

```
<button id="voteBtn">Siirry äänestykseen</button>
```

  </div>

  <!-- VOTING -->

  <div id="voting" class="hidden">
    <h2>Kuka on impostor?</h2>
    <div id="voteButtons"></div>
  </div>

  <!-- RESULT -->

  <div id="result" class="hidden">
    <div id="resultText"></div>
    <div id="scoreboard"></div>

```
<button id="nextBtn">Seuraava kierros</button>
```

  </div>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  onSnapshot,
  arrayUnion
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyAXj5Rv2zQ7rts_Fw8Rw6qwf_5VdW-v0PM',
  authDomain: 'impostor-bc841.firebaseapp.com',
  projectId: 'impostor-bc841',
  storageBucket: 'impostor-bc841.firebasestorage.app',
  messagingSenderId: '77515439959',
  appId: '1:77515439959:web:25a44bfda55365994a4812',
  measurementId: 'G-42FW73PZYN'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log('🔥 Firebase toimii');

/* ================= DATA ================= */

const places = [
  {
    name:'Ravintola',
    roles:['Kokki','Tarjoilija','Baarimikko','Asiakas','Ravintolapäällikkö','Tiskaaja']
  },
  {
    name:'Lentokenttä',
    roles:['Pilotti','Lentoemäntä','Turvatarkastaja','Matkustaja','Mekaanikko','Porttivirkailija']
  },
  {
    name:'Sairaala',
    roles:['Lääkäri','Hoitaja','Potilas','Kirurgi','Vastaanottovirkailija','Siivooja']
  },
  {
    name:'Kuntosali',
    roles:['Valmentaja','Asiakas','Respan työntekijä','Siivooja','Fysioterapeutti','Ryhmäliikuntaohjaaja']
  },
  {
    name:'Ruokakauppa',
    roles:['Kassatyöntekijä','Asiakas','Myymäläpäällikkö','Hyllyttäjä','Varastotyöntekijä','Vartija']
  }
];

let players = [];
let scores = {};
let currentRound = 1;
const totalRounds = 6;
let currentImpostor = '';
let currentGameCode = '';

/* ================= HELPERS ================= */

function hideAll(){
  ['home','lobby','roleScreen','voting','result']
    .forEach(id => document.getElementById(id).classList.add('hidden'));
}

function renderPlayers(){
  const list = document.getElementById('playerList');
  list.innerHTML = '';

  players.forEach(p => {
    const div = document.createElement('div');
    div.className = 'player';
    div.textContent = '• ' + p;
    list.appendChild(div);
  });
}

function renderScores(){
  const board = document.getElementById('scoreboard');
  board.innerHTML = '<h3>Pisteet</h3>';

  Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name,pts])=>{
      board.innerHTML += `
        <div class="score">
          <span>${name}</span>
          <strong>${pts} p</strong>
        </div>
      `;
    });
}

/* ================= CREATE GAME ================= */

async function createGame(){

  const hostName = document.getElementById('name').value.trim();

  if(!hostName){
    alert('Kirjoita nimesi');
    return;
  }

  const code = Math.random()
    .toString(36)
    .substring(2,8)
    .toUpperCase();

  currentGameCode = code;

  players = [hostName];
  scores = {};
  scores[hostName] = 0;

  await setDoc(doc(db, 'games', code), {
    code,
    players,
    scores,
    currentRound: 1,
    totalRounds
  });

  document.getElementById('gameCode').textContent = code;

  renderPlayers();

  hideAll();
  document.getElementById('lobby').classList.remove('hidden');

  onSnapshot(doc(db, 'games', code), (snap) => {
    if(snap.exists()){
      const data = snap.data();
      players = data.players || [];
      scores = data.scores || {};
      renderPlayers();
    }
  });
}

/* ================= JOIN GAME ================= */

async function joinGame(){

  const name = document.getElementById('name').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();

  if(!name || !code){
    alert('Kirjoita nimi ja pelikoodi');
    return;
  }

  const gameRef = doc(db, 'games', code);
  const gameSnap = await getDoc(gameRef);

  if(!gameSnap.exists()){
    alert('Peliä ei löytynyt');
    return;
  }

  await updateDoc(gameRef, {
    players: arrayUnion(name),
    [`scores.${name}`]: 0
  });

  currentGameCode = code;

  onSnapshot(gameRef, (snap) => {
    if(snap.exists()){
      const data = snap.data();
      players = data.players || [];
      scores = data.scores || {};
      renderPlayers();
    }
  });

  document.getElementById('gameCode').textContent = code;

  hideAll();
  document.getElementById('lobby').classList.remove('hidden');
}

/* ================= ROUND ================= */

function startRound(){

  const place = places[Math.floor(Math.random()*places.length)];

  const impostorIndex = Math.floor(Math.random()*players.length);
  currentImpostor = players[impostorIndex];

  let myRole;

  if(players[0] === currentImpostor){
    myRole = 'IMPOSTOR';
  } else {
    myRole = place.roles[0];
  }

  document.getElementById('roundInfo').textContent =
    `Kierros ${currentRound}/${totalRounds}`;

  const card = document.getElementById('roleCard');

  if(myRole === 'IMPOSTOR'){
    card.className = 'role impostor';
    card.innerHTML = `
      <h2>❌ IMPOSTOR</h2>
      <p>Yritä sulautua joukkoon mahdollisimman hyvin.</p>
    `;
  } else {
    card.className = 'role';
    card.innerHTML = `
      <div style="color:#6b7280;font-size:14px">PAIKKA</div>
      <div style="font-size:28px;font-weight:800;margin:6px 0 18px">
        ${place.name}
      </div>

      <div style="color:#6b7280;font-size:14px">ROOLI</div>
      <div style="font-size:34px;font-weight:900">
        ${myRole}
      </div>
    `;
  }

  hideAll();
  document.getElementById('roleScreen').classList.remove('hidden');
}

/* ================= VOTING ================= */

function showVoting(){

  hideAll();
  document.getElementById('voting').classList.remove('hidden');

  const container = document.getElementById('voteButtons');
  container.innerHTML = '';

  players.forEach(name => {

    const btn = document.createElement('button');
    btn.className = 'secondary';
    btn.textContent = name;

    btn.addEventListener('click', () => finishRound(name));

    container.appendChild(btn);
  });
}

function finishRound(voted){

  hideAll();
  document.getElementById('result').classList.remove('hidden');

  const correct = voted === currentImpostor;

  if(correct){
    scores[players[0]] = (scores[players[0]] || 0) + 1;
  } else {
    scores[currentImpostor] = (scores[currentImpostor] || 0) + 1;
  }

  document.getElementById('resultText').innerHTML = `
    <h2>Kierros ${currentRound}/${totalRounds}</h2>

    <p><strong>Impostor oli:</strong> ${currentImpostor}</p>
    <p><strong>Äänestit:</strong> ${voted}</p>

    <p>
      ${correct
        ? '✅ Oikein! +1 piste'
        : '❌ Väärin. Impostor sai +1 pisteen.'}
    </p>
  `;

  renderScores();

  document.getElementById('nextBtn').textContent =
    currentRound >= totalRounds
      ? 'Näytä voittaja'
      : 'Seuraava kierros';
}

/* ================= NEXT ROUND ================= */

function nextRound(){

  if(currentRound >= totalRounds){
    showWinner();
    return;
  }

  currentRound++;
  startRound();
}

function showWinner(){

  const winner = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('resultText').innerHTML = `
    <div class="winner">
      <div style="font-size:60px">🏆</div>
      <h2>Peli päättyi</h2>
      <h1>${winner[0]}</h1>
      <p>Voittaja ${winner[1]} pisteellä!</p>
    </div>
  `;

  document.getElementById('nextBtn').textContent = 'Pelaa uudelleen';

  document.getElementById('nextBtn').onclick = () => location.reload();
}

/* ================= BUTTONS ================= */

document.getElementById('createBtn')
  .addEventListener('click', createGame);

document.getElementById('joinBtn')
  .addEventListener('click', joinGame);

document.getElementById('startBtn')
  .addEventListener('click', startRound);

document.getElementById('voteBtn')
  .addEventListener('click', showVoting);

document.getElementById('nextBtn')
  .addEventListener('click', nextRound);

</script>

</body>
</html>
