<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPOSTOR</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f2f2f7;margin:0;padding:20px;display:flex;justify-content:center}
.card{background:white;width:100%;max-width:420px;border-radius:28px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;font-size:40px;margin:0 0 10px}
.subtitle{text-align:center;color:#6b7280;margin-bottom:24px}
input,button{width:100%;padding:16px;border-radius:16px;border:1px solid #d1d5db;margin-bottom:14px;font-size:16px;box-sizing:border-box}
button{background:#111827;color:white;border:none;font-weight:600;cursor:pointer}
.secondary{background:#f3f4f6;color:#111827}
.hidden{display:none}
.role{text-align:center;padding:24px;border-radius:22px;background:#f9fafb}
.impostor{background:#fef2f2;color:#dc2626}
.waiting{text-align:center;padding:24px}
</style>
</head>
<body>

<div class="card">

  <div id="home">
    <h1>🎭 IMPOSTOR</h1>
    <p class="subtitle">Monikierros seurapeli</p>
    <input id="name" placeholder="Nimesi">
    <input id="joinCode" placeholder="Pelikoodi">
    <button id="createBtn">Luo peli</button>
    <button id="joinBtn" class="secondary">Liity peliin</button>
  </div>

  <div id="lobby" class="hidden">
    <h2>Pelikoodi</h2>
    <div id="gameCode" style="font-size:32px;font-weight:700;text-align:center;margin-bottom:20px"></div>
    <h3>Pelaajat</h3>
    <div id="playerList"></div>
    <button id="startBtn">Aloita kierros</button>
  </div>

  <div id="roleScreen" class="hidden">
    <div id="roundInfo" style="margin-bottom:12px;font-weight:600"></div>
    <div id="roleCard" class="role"></div>
    <button id="voteBtn">Siirry äänestykseen</button>
  </div>

  <div id="voting" class="hidden">
    <h2>Kuka on impostor?</h2>
    <div id="voteButtons"></div>
  </div>

  <div id="waiting" class="hidden">
    <div class="waiting">
      <h2>Ääni tallennettu ✅</h2>
      <p id="waitingText">Odotetaan muita...</p>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyAXj5Rv2zQ7rts_Fw8Rw6qwf_5VdW-v0PM',
  authDomain: 'impostor-bc841.firebaseapp.com',
  projectId: 'impostor-bc841',
  storageBucket: 'impostor-bc841.firebasestorage.app',
  messagingSenderId: '77515439959',
  appId: '1:77515439959:web:25a44bfda55365994a4812'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const places = [
  {name:'Ravintola',roles:['Kokki','Tarjoilija','Baarimikko','Asiakas','Päällikkö']},
  {name:'Lentokenttä',roles:['Pilotti','Lentoemäntä','Turvatarkastaja','Matkustaja','Mekaanikko']},
  {name:'Sairaala',roles:['Lääkäri','Hoitaja','Potilas','Kirurgi','Respa']}
];

let currentGameCode = '';
let players = [];

const playerId = localStorage.getItem('playerId') || Math.random().toString(36).slice(2);
localStorage.setItem('playerId', playerId);

function hideAll(){
  ['home','lobby','roleScreen','voting','waiting']
    .forEach(id=>document.getElementById(id).classList.add('hidden'));
}

function renderPlayers(){
  const list=document.getElementById('playerList');
  list.innerHTML='';
  players.forEach(p=>{
    const div=document.createElement('div');
    div.textContent='• '+p.name;
    div.style.padding='8px 0';
    list.appendChild(div);
  });
}

function listenToGame(code){
  onSnapshot(doc(db,'games',code),(snap)=>{
    if(!snap.exists()) return;

    const data=snap.data();
    players=data.players||[];
    renderPlayers();

    const votes=data.votes||{};
    const hasVoted=!!votes[playerId];

    // OMA ROOLI
    if(data.gameState==='playing' && data.roles){
      const myRole=data.roles[playerId];
      if(myRole) showMyRole(myRole,data.currentRound||1);
    }

    // ÄÄNESTYS
    if(data.gameState==='voting'){
      if(hasVoted){
        hideAll();
        document.getElementById('waiting').classList.remove('hidden');
        document.getElementById('waitingText').textContent =
          `${Object.keys(votes).length}/${players.length} pelaajaa äänestänyt`;
      }else{
        showVoting();
      }
    }

    // KAIKKI ÄÄNESTÄNEET
    if(data.gameState==='results'){
      alert('Kaikki äänestivät! Tulokset tehdään seuraavaksi.');
    }
  });
}

async function createGame(){
  const name=document.getElementById('name').value.trim();
  if(!name){alert('Kirjoita nimesi');return;}

  const code=Math.random().toString(36).substring(2,8).toUpperCase();
  currentGameCode=code;

  const me={id:playerId,name};

  await setDoc(doc(db,'games',code),{
    code,
    players:[me],
    currentRound:1,
    gameState:'lobby',
    votes:{}
  });

  document.getElementById('gameCode').textContent=code;
  players=[me];
  renderPlayers();

  hideAll();
  document.getElementById('lobby').classList.remove('hidden');

  listenToGame(code);
}

async function joinGame(){
  const name=document.getElementById('name').value.trim();
  const code=document.getElementById('joinCode').value.trim().toUpperCase();

  if(!name || !code){alert('Kirjoita nimi ja koodi');return;}

  const gameRef=doc(db,'games',code);
  const snap=await getDoc(gameRef);

  if(!snap.exists()){alert('Peliä ei löytynyt');return;}

  const data=snap.data();
  const currentPlayers=data.players||[];

  if(!currentPlayers.find(p=>p.id===playerId)){
    currentPlayers.push({id:playerId,name});
    await updateDoc(gameRef,{players:currentPlayers});
  }

  currentGameCode=code;
  document.getElementById('gameCode').textContent=code;

  hideAll();
  document.getElementById('lobby').classList.remove('hidden');

  listenToGame(code);
}

async function startRound(){
  const gameRef=doc(db,'games',currentGameCode);
  const snap=await getDoc(gameRef);
  const data=snap.data();
  const currentPlayers=data.players||[];

  if(currentPlayers.length<3){
    alert('Tarvitaan vähintään 3 pelaajaa');
    return;
  }

  const place=places[Math.floor(Math.random()*places.length)];
  const impostorIndex=Math.floor(Math.random()*currentPlayers.length);
  const impostorId=currentPlayers[impostorIndex].id;

  const shuffled=[...place.roles].sort(()=>Math.random()-0.5);

  const roles={};
  let roleIndex=0;

  currentPlayers.forEach(player=>{
    if(player.id===impostorId){
      roles[player.id]={impostor:true};
    }else{
      roles[player.id]={
        impostor:false,
        place:place.name,
        role:shuffled[roleIndex]
      };
      roleIndex++;
    }
  });

  await updateDoc(gameRef,{
    gameState:'playing',
    roles,
    impostorId,
    votes:{}
  });
}

function showMyRole(roleData,round){
  document.getElementById('roundInfo').textContent=`Kierros ${round}/6`;

  const card=document.getElementById('roleCard');

  if(roleData.impostor){
    card.className='role impostor';
    card.innerHTML='<h2>❌ IMPOSTOR</h2><p>Et tiedä paikkaa.</p>';
  }else{
    card.className='role';
    card.innerHTML=`
      <div style="color:#6b7280">PAIKKA</div>
      <div style="font-size:28px;font-weight:700;margin-bottom:16px">${roleData.place}</div>
      <div style="color:#6b7280">ROOLI</div>
      <div style="font-size:32px;font-weight:800">${roleData.role}</div>
    `;
  }

  hideAll();
  document.getElementById('roleScreen').classList.remove('hidden');
}

async function openVoting(){
  await updateDoc(doc(db,'games',currentGameCode),{
    gameState:'voting'
  });
}

function showVoting(){
  hideAll();
  document.getElementById('voting').classList.remove('hidden');

  const container=document.getElementById('voteButtons');
  container.innerHTML='';

  players.forEach(player=>{
    const btn=document.createElement('button');
    btn.className='secondary';
    btn.textContent=player.name;
    btn.onclick=()=>submitVote(player.id);
    container.appendChild(btn);
  });
}

async function submitVote(targetId){
  const gameRef=doc(db,'games',currentGameCode);
  const snap=await getDoc(gameRef);
  const data=snap.data();

  const votes=data.votes||{};

  // Estä tuplaäänestys
  if(votes[playerId]) return;

  votes[playerId]=targetId;

  const voteCount=Object.keys(votes).length;
  const total=(data.players||[]).length;

  await updateDoc(gameRef,{
    votes,
    gameState: voteCount>=total ? 'results' : 'voting'
  });

  // Vain minä menen odotukseen
  hideAll();
  document.getElementById('waiting').classList.remove('hidden');
  document.getElementById('waitingText').textContent=
    `${voteCount}/${total} pelaajaa äänestänyt`;
}

// NAPIT
document.getElementById('createBtn').addEventListener('click', createGame);
document.getElementById('joinBtn').addEventListener('click', joinGame);
document.getElementById('startBtn').addEventListener('click', startRound);
document.getElementById('voteBtn').addEventListener('click', openVoting);

</script>

</body>
</html>
