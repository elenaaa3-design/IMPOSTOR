<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPOSTOR</title>
<style>
body{
  font-family:-apple-system,sans-serif;
  background:#f2f2f7;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}
.card{
  background:white;
  width:100%;
  max-width:420px;
  border-radius:28px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1{text-align:center;font-size:40px;margin:0 0 10px;}
.subtitle{text-align:center;color:#6b7280;margin-bottom:24px;}
input,button{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid #d1d5db;
  margin-bottom:14px;
  font-size:16px;
  box-sizing:border-box;
}
button{
  background:#111827;
  color:white;
  border:none;
  font-weight:600;
}
.secondary{
  background:#f3f4f6;
  color:#111827;
}
.hidden{display:none;}
.role{
  text-align:center;
  padding:24px;
  border-radius:22px;
  background:#f9fafb;
}
.impostor{
  background:#fef2f2;
  color:#dc2626;
}
</style>
</head>
<body>

<div class="card">

  <div id="home">
    <h1>🎭 IMPOSTOR</h1>
    <p class="subtitle">Apple-tyylinen seurapeli</p>

    <input id="name" placeholder="Nimesi">
    <input id="code" placeholder="Pelikoodi">

    <button onclick="createGame()">Luo peli</button>
    <button class="secondary" onclick="joinGame()">Liity peliin</button>
  </div>

  <div id="lobby" class="hidden">
    <h2>Pelikoodi</h2>
    <div id="gameCode" style="font-size:32px;font-weight:700;margin-bottom:20px"></div>

    <h3>Pelaajat</h3>
    <div id="playerList"></div>

    <button onclick="startGame()">Aloita peli</button>
  </div>

  <div id="roleScreen" class="hidden">
    <div id="roleCard" class="role"></div>
    <button onclick="showVoting()">Siirry äänestykseen</button>
  </div>

  <div id="voting" class="hidden">
    <h2>Kuka on impostor?</h2>
    <div id="voteButtons"></div>
  </div>

  <div id="result" class="hidden">
    <h2>🏆 Kierros valmis</h2>
    <div id="resultText"></div>
    <button onclick="location.reload()">Uusi peli</button>
  </div>

</div>

<script>
const places = [
  {name:'Ravintola',roles:['Kokki','Tarjoilija','Baarimikko','Asiakas','Ravintolapäällikkö','Tiskaaja']},
  {name:'Lentokenttä',roles:['Pilotti','Lentoemäntä','Turvatarkastaja','Matkustaja','Mekaanikko','Porttivirkailija']},
  {name:'Sairaala',roles:['Lääkäri','Hoitaja','Potilas','Kirurgi','Vastaanottovirkailija','Siivooja']}
];

let players = [];
let impostor = '';

function hideAll(){
  ['home','lobby','roleScreen','voting','result']
    .forEach(id=>document.getElementById(id).classList.add('hidden'));
}

function createGame(){
  const code = Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById('gameCode').textContent = code;
  players = ['Elena','Sofia','Oona','Veera','Emma'];
  renderPlayers();
  hideAll();
  document.getElementById('lobby').classList.remove('hidden');
}

function joinGame(){
  const name = document.getElementById('name').value.trim();
  const code = document.getElementById('code').value.trim().toUpperCase();

  if(!name || !code){
    alert('Syötä nimi ja pelikoodi');
    return;
  }

  document.getElementById('gameCode').textContent = code;
  players.push(name);
  renderPlayers();

  hideAll();
  document.getElementById('lobby').classList.remove('hidden');
}

function renderPlayers(){
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  players.forEach(p=>{
    const div = document.createElement('div');
    div.style.padding = '10px 0';
    div.textContent = '• ' + p;
    list.appendChild(div);
  });
}

function startGame(){
  const place = places[Math.floor(Math.random()*places.length)];
  const realRoles = place.roles.slice(0, Math.max(players.length-1,1));

  let roles = [...realRoles,'IMPOSTOR']
    .sort(()=>Math.random()-0.5);

  impostor = players[roles.indexOf('IMPOSTOR')] || players[0];

  const myRole = roles[0];

  const card = document.getElementById('roleCard');

  if(myRole === 'IMPOSTOR'){
    card.className = 'role impostor';
    card.innerHTML = '<h2>❌ IMPOSTOR</h2><p>Yritä sulautua joukkoon.</p>';
  } else {
    card.className = 'role';
    card.innerHTML = `
      <div style="color:#6b7280;font-size:14px">PAIKKA</div>
      <div style="font-size:28px;font-weight:700;margin-bottom:16px">${place.name}</div>
      <div style="color:#6b7280;font-size:14px">ROOLI</div>
      <div style="font-size:32px;font-weight:800">${myRole}</div>
    `;
  }

  hideAll();
  document.getElementById('roleScreen').classList.remove('hidden');
}

function showVoting(){
  hideAll();
  document.getElementById('voting').classList.remove('hidden');

  const container = document.getElementById('voteButtons');
  container.innerHTML = '';

  players.forEach(name=>{
    const btn = document.createElement('button');
    btn.className = 'secondary';
    btn.textContent = name;
    btn.onclick = ()=>finishRound(name);
    container.appendChild(btn);
  });
}

function finishRound(voted){
  hideAll();
  document.getElementById('result').classList.remove('hidden');

  const correct = voted === impostor;

  document.getElementById('resultText').innerHTML = `
    <p><strong>Impostor oli:</strong> ${impostor}</p>
    <p><strong>Äänestit:</strong> ${voted}</p>
    <p>${correct ? '✅ Oikein! +1 piste' : '❌ Väärin. Impostor saa pisteen.'}</p>
  `;
}
</script>

</body>
</html>
