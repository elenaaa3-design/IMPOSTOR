<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPOSTOR</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f2f2f7;margin:0;padding:20px;display:flex;justify-content:center}
.card{background:white;width:100%;max-width:420px;border-radius:28px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;font-size:40px;margin:0 0 10px}
.subtitle{text-align:center;color:#6b7280;margin-bottom:24px}
input,button{width:100%;padding:16px;border-radius:16px;border:1px solid #d1d5db;margin-bottom:14px;font-size:16px;box-sizing:border-box}
button{background:#111827;color:white;border:none;font-weight:600}
.secondary{background:#f3f4f6;color:#111827}
.hidden{display:none}
.role{text-align:center;padding:24px;border-radius:22px;background:#f9fafb}
.impostor{background:#fef2f2;color:#dc2626}
.score{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
</style>
</head>
<body>

<div class="card">
  <div id="home">
    <h1>🎭 IMPOSTOR</h1>
    <p class="subtitle">Monikierros seurapeli</p>

    <input id="name" placeholder="Nimesi">
    <button onclick="createGame()">Luo peli</button>
  </div>

  <div id="lobby" class="hidden">
    <h2>Pelikoodi</h2>
    <div id="gameCode" style="font-size:32px;font-weight:700;margin-bottom:20px"></div>

    <h3>Pelaajat</h3>
    <div id="playerList"></div>

    <button onclick="startRound()">Aloita kierros</button>
  </div>

  <div id="roleScreen" class="hidden">
    <div id="roundInfo" style="margin-bottom:12px;font-weight:600"></div>
    <div id="roleCard" class="role"></div>
    <button onclick="showVoting()">Siirry äänestykseen</button>
  </div>

  <div id="voting" class="hidden">
    <h2>Kuka on impostor?</h2>
    <div id="voteButtons"></div>
  </div>

  <div id="result" class="hidden">
    <div id="resultText"></div>
    <div id="scoreboard"></div>
    <button id="nextBtn" onclick="nextRound()">Seuraava kierros</button>
  </div>
</div>

<script>
const places=[
  {name:'Ravintola',roles:['Kokki','Tarjoilija','Baarimikko','Asiakas','Ravintolapäällikkö','Tiskaaja']},
  {name:'Lentokenttä',roles:['Pilotti','Lentoemäntä','Turvatarkastaja','Matkustaja','Mekaanikko','Porttivirkailija']},
  {name:'Sairaala',roles:['Lääkäri','Hoitaja','Potilas','Kirurgi','Vastaanottovirkailija','Siivooja']}
];

let players=[];
let scores={};
let currentRound=1;
let totalRounds=6;
let currentImpostor='';

function hideAll(){
  ['home','lobby','roleScreen','voting','result']
    .forEach(id=>document.getElementById(id).classList.add('hidden'));
}

function createGame(){
  const hostName=document.getElementById('name').value.trim();

  if(!hostName){
    alert('Kirjoita nimesi');
    return;
  }

  players=[hostName];
  scores={};
  scores[hostName]=0;

  const code=Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById('gameCode').textContent=code;

  renderPlayers();
  hideAll();
  document.getElementById('lobby').classList.remove('hidden');
}

function renderPlayers(){
  const list=document.getElementById('playerList');
  list.innerHTML='';

  players.forEach(p=>{
    const div=document.createElement('div');
    div.textContent='• '+p;
    div.style.padding='8px 0';
    list.appendChild(div);
  });
}

function startRound(){
  const place=places[Math.floor(Math.random()*places.length)];
  const roles=[...place.roles.slice(0,1),'IMPOSTOR'].sort(()=>Math.random()-0.5);

  currentImpostor=roles.includes('IMPOSTOR')?players[0]:players[0];

  document.getElementById('roundInfo').textContent=
    `Kierros ${currentRound}/${totalRounds}`;

  const role=roles[0];
  const card=document.getElementById('roleCard');

  if(role==='IMPOSTOR'){
    card.className='role impostor';
    card.innerHTML='<h2>❌ IMPOSTOR</h2><p>Yritä sulautua joukkoon.</p>';
  }else{
    card.className='role';
    card.innerHTML=`
      <div style="color:#6b7280">PAIKKA</div>
      <div style="font-size:28px;font-weight:700;margin-bottom:16px">${place.name}</div>
      <div style="color:#6b7280">ROOLI</div>
      <div style="font-size:32px;font-weight:800">${role}</div>
    `;
  }

  hideAll();
  document.getElementById('roleScreen').classList.remove('hidden');
}

function showVoting(){
  hideAll();
  document.getElementById('voting').classList.remove('hidden');

  const container=document.getElementById('voteButtons');
  container.innerHTML='';

  players.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='secondary';
    btn.textContent=name;
    btn.onclick=()=>finishRound(name);
    container.appendChild(btn);
  });
}

function finishRound(voted){
  hideAll();
  document.getElementById('result').classList.remove('hidden');

  const correct=voted===currentImpostor;

  if(correct){
    scores[players[0]]+=1;
  }else{
    scores[currentImpostor]+=1;
  }

  document.getElementById('resultText').innerHTML=`
    <h2>Kierros ${currentRound}/${totalRounds}</h2>
    <p><strong>Impostor oli:</strong> ${currentImpostor}</p>
    <p><strong>Äänestit:</strong> ${voted}</p>
    <p>${correct?'✅ Oikein! +1 piste':'❌ Väärin. Impostor sai +1 pisteen.'}</p>
  `;

  renderScores();

  if(currentRound>=totalRounds){
    document.getElementById('nextBtn').textContent='Näytä voittaja';
  }else{
    document.getElementById('nextBtn').textContent='Seuraava kierros';
  }
}

function renderScores(){
  const board=document.getElementById('scoreboard');
  board.innerHTML='<h3>Pisteet</h3>';

  Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name,pts])=>{
      board.innerHTML+=`
        <div class="score">
          <span>${name}</span>
          <strong>${pts} p</strong>
        </div>
      `;
    });
}

function nextRound(){
  if(currentRound>=totalRounds){
    showWinner();
    return;
  }

  currentRound++;
  startRound();
}

function showWinner(){
  const winner=Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('resultText').innerHTML=`
    <div style="background:#ecfdf5;padding:24px;border-radius:24px;text-align:center">
      <div style="font-size:56px">🏆</div>
      <h2>Peli päättyi</h2>
      <h1>${winner[0]}</h1>
      <p>Voittaja ${winner[1]} pisteellä!</p>
    </div>
  `;

  document.getElementById('nextBtn').textContent='Pelaa uudelleen';
  document.getElementById('nextBtn').onclick=()=>location.reload();
}
</script>

</body>
</html>
